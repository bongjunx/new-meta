<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Meta — 텍스트 턴제 RPG</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/galmuri@latest/dist/galmuri.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- ══════════ 직업 선택 화면 ══════════ -->
<div id="screen-select" class="screen">
  <div class="select-inner">
    <h1 class="game-title">NEW META</h1>
    <p class="game-subtitle">— 텍스트 턴제 RPG —</p>
    <div id="class-cards" class="class-cards"></div>
    <div class="name-row">
      <input id="hero-name" type="text" maxlength="10" placeholder="영웅의 이름" value="모험가">
      <button id="btn-start" class="btn btn-gold btn-lg">모험 시작</button>
    </div>
    <p id="save-notice" class="save-notice hidden"></p>
  </div>
</div>

<!-- ══════════ 메인 게임 화면 ══════════ -->
<div id="screen-game" class="screen hidden">

  <!-- 상단 캐릭터 바 -->
  <header id="topbar">
    <div class="portrait-wrap"><canvas id="portrait" width="64" height="64"></canvas></div>
    <div class="topbar-info">
      <div class="topbar-name-row">
        <span id="tb-name" class="tb-name"></span>
        <span id="tb-class" class="tb-class"></span>
        <span id="tb-level" class="tb-level"></span>
      </div>
      <div class="bar-row"><span class="bar-label">HP</span><div class="bar hp-bar"><div id="tb-hp-fill" class="bar-fill"></div><span id="tb-hp-text" class="bar-text"></span></div></div>
      <div class="bar-row"><span class="bar-label">MP</span><div class="bar mp-bar"><div id="tb-mp-fill" class="bar-fill"></div><span id="tb-mp-text" class="bar-text"></span></div></div>
      <div class="bar-row"><span class="bar-label">EXP</span><div class="bar exp-bar"><div id="tb-exp-fill" class="bar-fill"></div><span id="tb-exp-text" class="bar-text"></span></div></div>
    </div>
    <div class="topbar-right">
      <div id="tb-gold" class="tb-gold">🪙 0</div>
      <div id="tb-stone" class="tb-stone">💎 0</div>
      <button id="btn-reset" class="btn btn-tiny btn-dark" title="저장 데이터 초기화">초기화</button>
    </div>
  </header>

  <!-- 탭 내비게이션 -->
  <nav id="tabs">
    <button class="tab active" data-tab="village">🏘️ 마을</button>
    <button class="tab" data-tab="stats">📜 능력치</button>
    <button class="tab" data-tab="skills">✨ 스킬</button>
    <button class="tab" data-tab="inventory">🎒 가방</button>
    <button class="tab" data-tab="forge">⚒️ 대장간</button>
    <button class="tab" data-tab="shop">🏪 상점</button>
  </nav>

  <main id="content">
    <section id="tab-village" class="tab-panel"></section>
    <section id="tab-stats" class="tab-panel hidden"></section>
    <section id="tab-skills" class="tab-panel hidden"></section>
    <section id="tab-inventory" class="tab-panel hidden"></section>
    <section id="tab-forge" class="tab-panel hidden"></section>
    <section id="tab-shop" class="tab-panel hidden"></section>
  </main>
</div>

<!-- ══════════ 전투 화면 ══════════ -->
<div id="screen-battle" class="screen hidden">
  <div id="battle-stage">
    <div id="stage-bg"></div>
    <div id="stage-ground"></div>

    <!-- 아군 -->
    <div id="unit-player" class="unit unit-player">
      <div class="unit-plate">
        <div class="unit-name" id="bp-name"></div>
        <div class="mini-bar hp"><div id="bp-hp" class="mini-fill"></div><span id="bp-hp-t" class="mini-text"></span></div>
        <div class="mini-bar mp"><div id="bp-mp" class="mini-fill"></div><span id="bp-mp-t" class="mini-text"></span></div>
        <div class="status-icons" id="bp-status"></div>
      </div>
      <div class="sprite-wrap"><canvas id="sprite-player" width="192" height="192"></canvas><div class="unit-shadow"></div></div>
    </div>

    <!-- 적군 -->
    <div id="unit-monster" class="unit unit-monster">
      <div class="unit-plate">
        <div class="unit-name" id="bm-name"></div>
        <div class="mini-bar hp"><div id="bm-hp" class="mini-fill"></div><span id="bm-hp-t" class="mini-text"></span></div>
        <div class="status-icons" id="bm-status"></div>
      </div>
      <div class="sprite-wrap"><canvas id="sprite-monster" width="192" height="192"></canvas><div class="unit-shadow"></div></div>
    </div>

    <div id="fx-layer"></div>
    <div id="turn-banner" class="hidden"></div>
  </div>

  <div id="battle-bottom">
    <div id="battle-log"></div>
    <div id="battle-actions">
      <div id="action-skills"></div>
      <div id="action-etc">
        <button id="btn-attack" class="btn action-btn atk-btn"><span class="ab-name">⚔️ 기본 공격</span><span class="ab-desc">MP 소모 없음</span></button>
        <button id="btn-potion-hp" class="btn action-btn pot-btn"><span class="ab-name">🧪 HP 물약</span><span class="ab-desc" id="pot-hp-cnt"></span></button>
        <button id="btn-potion-mp" class="btn action-btn pot-btn"><span class="ab-name">🔮 MP 물약</span><span class="ab-desc" id="pot-mp-cnt"></span></button>
        <button id="btn-flee" class="btn action-btn flee-btn"><span class="ab-name">🏃 도망</span><span class="ab-desc">50% 확률</span></button>
      </div>
    </div>
  </div>
</div>

<!-- 전투 결과 모달 -->
<div id="modal-result" class="modal hidden">
  <div class="modal-box">
    <h2 id="result-title"></h2>
    <div id="result-body"></div>
    <div class="modal-btns">
      <button id="btn-result-again" class="btn btn-gold">한 번 더</button>
      <button id="btn-result-village" class="btn btn-dark">마을로</button>
    </div>
  </div>
</div>

<!-- 범용 모달 (아이템 상세 등) -->
<div id="modal-generic" class="modal hidden">
  <div class="modal-box" id="modal-generic-box"></div>
</div>

<div id="toast-layer"></div>

<script src="js/data.js"></script>
<script src="js/sprites.js"></script>
<script src="js/game.js"></script>
<script src="js/battle.js"></script>
<script src="js/ui.js"></script>
<script src="js/main.js"></script>
</body>
</html>
